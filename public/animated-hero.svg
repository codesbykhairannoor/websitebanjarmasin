<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cyan Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#bgGrad)" rx="15" ry="15"/>

  <style>
    .title { font: bold 38px 'Segoe UI', sans-serif; fill: url(#goldGrad); text-anchor: middle; letter-spacing: 2px; }
    .subtitle { font: 600 16px 'Segoe UI', sans-serif; fill: #94a3b8; text-anchor: middle; letter-spacing: 4px; }
    .tech { font: 13px Consolas, monospace; fill: #38bdf8; text-anchor: middle; letter-spacing: 1px; }
    
    @keyframes floatCube {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    
    @keyframes floatShadow {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(0.8); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.5; }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.7; }
      50% { opacity: 1; filter: drop-shadow(0 0 10px #38bdf8); }
      100% { opacity: 0.7; }
    }
    
    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(20px); }
    }

    .cube { animation: floatCube 4s ease-in-out infinite; transform-origin: 400px 90px; }
    .shadow { animation: floatShadow 4s ease-in-out infinite; transform-origin: 400px 150px; }
    .glow-text { animation: pulseGlow 3s ease-in-out infinite; }
    
    .grid-line { stroke: #1e293b; stroke-width: 1; }
  </style>

  <!-- Animated Perspective Grid Background -->
  <g opacity="0.3">
    <path d="M 0 200 L 800 200" class="grid-line" />
    <path d="M 0 220 L 800 220" class="grid-line" />
    <path d="M 0 240 L 800 240" class="grid-line" />
    <path d="M 0 260 L 800 260" class="grid-line" />
    <path d="M 0 280 L 800 280" class="grid-line" />
    
    <path d="M 400 200 L 400 300" class="grid-line" />
    <path d="M 400 200 L 300 300" class="grid-line" />
    <path d="M 400 200 L 200 300" class="grid-line" />
    <path d="M 400 200 L 100 300" class="grid-line" />
    <path d="M 400 200 L 0 300" class="grid-line" />
    
    <path d="M 400 200 L 500 300" class="grid-line" />
    <path d="M 400 200 L 600 300" class="grid-line" />
    <path d="M 400 200 L 700 300" class="grid-line" />
    <path d="M 400 200 L 800 300" class="grid-line" />
  </g>

  <!-- Floating 3D Cube (Isometric) -->
  <ellipse cx="400" cy="150" rx="40" ry="10" fill="#020617" class="shadow" />
  
  <g class="cube">
    <!-- Top Face -->
    <path d="M 400 40 L 450 65 L 400 90 L 350 65 Z" fill="#38bdf8" opacity="0.9" />
    <!-- Left Face -->
    <path d="M 350 65 L 400 90 L 400 140 L 350 115 Z" fill="#0284c7" />
    <!-- Right Face -->
    <path d="M 400 90 L 450 65 L 450 115 L 400 140 Z" fill="#0c4a6e" />
    
    <!-- Cyberpunk Inner Core -->
    <path d="M 400 55 L 420 65 L 400 75 L 380 65 Z" fill="#fef08a" filter="url(#glow)" class="glow-text"/>
  </g>

  <!-- Typography -->
  <text x="400" y="200" class="title glow-text">SASIRANGAN SHOWCASE 3D</text>
  <text x="400" y="230" class="subtitle">MUSEUM VIRTUAL &amp; CULTURE VERSE</text>
  
  <!-- Tech Stack Pills -->
  <g transform="translate(230, 255)">
    <rect width="90" height="24" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-width="1"/>
    <text x="45" y="16" class="tech">React 18</text>
  </g>
  <g transform="translate(330, 255)">
    <rect width="140" height="24" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
    <text x="70" y="16" class="tech" fill="#fbbf24">Three.js / WebGL</text>
  </g>
  <g transform="translate(480, 255)">
    <rect width="100" height="24" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
    <text x="50" y="16" class="tech" fill="#10b981">TailwindCSS</text>
  </g>
</svg>
