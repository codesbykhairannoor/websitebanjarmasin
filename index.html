<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Eksplorasi Wisata & Budaya Kota Banjarmasin</title>
    
    <!-- 🛡️ SUPER SECURITY PROTOCOLS (Anti-XSS, Clickjacking Defense, & Strict Referrer) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <!-- 🚀 BLAZING FAST PERFORMANCE OPTIMIZATIONS -->
    <!-- Preconnect & DNS Prefetch to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- Preload Hero Image (LCP Optimization) -->
    <link rel="preload" as="image" href="/wisata/960px-Pasar_Terapung_Siring_Banj.webp" fetchpriority="high">
    
    <!-- Google Fonts: Space Grotesk (Devpost Winner Heading) & Plus Jakarta Sans (Modern UI) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet"></noscript>
  </head>
  <body>
    <script>
      (function() {
        try {
          var currentTheme = localStorage.getItem('theme');
          if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
